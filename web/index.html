<!DOCTYPE html>
<html lang="en">
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Klinixy — The Pulse of Digital Care. Order genuine medicines, health products and wellness essentials delivered in 30 minutes.">
  <meta name="keywords" content="klinixy, medicine delivery, online pharmacy, health products, medicine app, 30 minute delivery">
  <meta name="author" content="Klinixy">
  <meta name="theme-color" content="#0D2B6E">

  <!-- Open Graph / Social -->
  <meta property="og:type" content="website">
  <meta property="og:title" content="Klinixy — The Pulse of Digital Care">
  <meta property="og:description" content="Order genuine medicines delivered in 30 minutes. 100% genuine. Best prices.">
  <meta property="og:image" content="icons/Icon-512.png">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Klinixy">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>Klinixy — The Pulse of Digital Care</title>
  <link rel="manifest" href="manifest.json">

  <!-- Google Maps JavaScript API (required for google_maps_flutter on web) -->
  <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyAunmmtJVnI36BqnW8piPQFMPH_7h-Mzhw&libraries=places" defer></script>

  <!-- Splash screen background matching brand -->
  <style>
    body {
      background-color: #0D2B6E;
      margin: 0;
      padding: 0;
    }
    #loading-splash {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #00C8F0 0%, #1A5AFF 45%, #0D2B6E 100%);
      z-index: 9999;
      transition: opacity 0.4s ease;
    }
    #loading-splash img {
      width: 90px;
      height: 90px;
      border-radius: 22px;
      background: white;
      padding: 12px;
      box-shadow: 0 16px 48px rgba(0,0,0,0.25), 0 0 60px rgba(0,200,240,0.3);
      animation: pulse 1.8s ease-in-out infinite;
    }
    #loading-splash .brand-name {
      margin-top: 20px;
      font-family: sans-serif;
      font-size: 30px;
      font-weight: 800;
      letter-spacing: 6px;
      color: white;
    }
    #loading-splash .tagline {
      margin-top: 6px;
      font-family: sans-serif;
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 2.5px;
      color: rgba(255,255,255,0.75);
      text-transform: uppercase;
    }
    #loading-splash .loader {
      margin-top: 40px;
      width: 32px;
      height: 32px;
      border: 2.5px solid rgba(255,255,255,0.3);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.04); }
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <!-- Web splash screen shown while Flutter initializes -->
  <div id="loading-splash">
    <img src="icons/Icon-192.png" alt="Klinixy Logo">
    <div class="brand-name">KLINIXY</div>
    <div class="tagline">The Pulse of Digital Care</div>
    <div class="loader"></div>
  </div>

  <script src="flutter_bootstrap.js" async></script>

  <script>
    // Hide splash once Flutter takes over
    window.addEventListener('flutter-first-frame', function () {
      const splash = document.getElementById('loading-splash');
      if (splash) {
        splash.style.opacity = '0';
        setTimeout(() => splash.remove(), 400);
      }
    });
  </script>
</body>
</html>
