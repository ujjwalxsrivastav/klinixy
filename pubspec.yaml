name: klinixy
description: "Klinixy — Medicine Quick Commerce App. Get medicines delivered in 30 minutes."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter

  # ── Firebase ──────────────────────────────────────
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.4
  firebase_storage: ^12.3.3
  firebase_messaging: ^15.1.3

  # ── Auth ──────────────────────────────────────────
  google_sign_in: ^6.2.1

  # ── State Management ──────────────────────────────
  flutter_bloc: ^8.1.6
  equatable: ^2.0.5

  # ── Navigation ────────────────────────────────────
  go_router: ^14.3.0

  # ── Dependency Injection ──────────────────────────
  get_it: ^8.0.2

  # ── Maps & Location ───────────────────────────────
  google_maps_flutter: ^2.9.0
  geolocator: ^13.0.2
  geocoding: ^3.0.0

  # ── UI / UX ───────────────────────────────────────
  google_fonts: ^6.2.1
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0
  lottie: ^3.1.2
  smooth_page_indicator: ^1.2.0
  flutter_rating_bar: ^4.0.1
  badges: ^3.1.2
  cupertino_icons: ^1.0.8

  # ── Media & File ──────────────────────────────────
  image_picker: ^1.1.2

  # ── Utils ─────────────────────────────────────────
  intl: ^0.20.1
  shared_preferences: ^2.3.3
  connectivity_plus: ^6.1.0
  permission_handler: ^11.3.1
  url_launcher: ^6.3.1
  package_info_plus: ^8.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/animations/
    - assets/icons/

